<!DOCTYPE html>
<html>
  <head>
    <title>VR Voxel Engine v2</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.1.0/dist/aframe-extras.min.js"></script>

    <script>
      // SANDBOX DESIGN SYSTEM CONFIGURATION
      const BLOCK_TYPES = [
        { id: 'grass', color: '#557a46', name: '🌿 Grass' },
        { id: 'dirt',  color: '#8b5a2b', name: '🟫 Dirt' },
        { id: 'stone', color: '#73777B', name: '🪨 Stone' }
      ];

      // 16x16 MATRIX BOUNDARIES 
      const WORLD_BOUNDS = { minX: -8, maxX: 7, minZ: -12, maxZ: 3, minY: -2, maxY: 8 };

      // CENTRAL WORLD ARCHITECT
      AFRAME.registerComponent('world-manager', {
        init: function () {
          this.worldData = {}; 
          this.selectedBlockIndex = 0;
          this.hudText = document.querySelector('#hud-text');

          // Local Storage Verification Loop
          const savedWorld = localStorage.getItem('vr_sandbox_save_v2');
          if (savedWorld) {
            this.worldData = JSON.parse(savedWorld);
            this.renderWorld();
          } else {
            this.generateProceduralSandbox();
          }
          
          this.updateHUD();

          this.el.addEventListener('cycle-block', () => {
            this.selectedBlockIndex = (this.selectedBlockIndex + 1) % BLOCK_TYPES.length;
            this.updateHUD();
          });
        },

        generateProceduralSandbox: function() {
          // Generate a strict 16x16 grid utilizing two core layers
          for (let x = WORLD_BOUNDS.minX; x <= WORLD_BOUNDS.maxX; x++) {
            for (let z = WORLD_BOUNDS.minZ; z <= WORLD_BOUNDS.maxZ; z++) {
              this.worldData[`${x},-1,${z}`] = 1; // Base Layer: Dirt
              this.worldData[`${x},0,${z}`] = 0;  // Top Layer: Grass
            }
          }
          this.renderWorld();
          this.saveWorld();
        },

        renderWorld: function() {
          const existingBlocks = document.querySelectorAll('.voxel');
          existingBlocks.forEach(b => b.parentNode.removeChild(b));

          Object.keys(this.worldData).forEach(key => {
            const [x, y, z] = key.split(',').map(Number);
            const blockTypeIdx = this.worldData[key];
            this.spawnBlockEntity(x, y, z, blockTypeIdx);
          });
        },

        spawnBlockEntity: function(x, y, z, typeIdx) {
          const blockInfo = BLOCK_TYPES[typeIdx];
          if (!blockInfo) return;

          let box = document.createElement('a-box');
          box.setAttribute('class', 'voxel');
          box.setAttribute('position', `${x} ${y} ${z}`);
          box.setAttribute('width', '1');
          box.setAttribute('height', '1');
          box.setAttribute('depth', '1');
          box.setAttribute('material', `color: ${blockInfo.color}; roughness: 1.0; flatShading: true;`);
          box.dataset.gridPos = `${x},${y},${z}`;

          this.el.appendChild(box);
        },

        addBlockAtIntersection: function(intersection) {
          const currentBlockPos = intersection.el.object3D.position;
          const normal = intersection.face.normal;

          // Compute absolute grid positioning coordinates
          const newX = Math.round(currentBlockPos.x + normal.x);
          const newY = Math.round(currentBlockPos.y + normal.y);
          const newZ = Math.round(currentBlockPos.z + normal.z);
          const newKey = `${newX},${newY},${newZ}`;

          // PLACEMENT VALIDATION SECURITY GUARDRAILS
          if (newX < WORLD_BOUNDS.minX || newX > WORLD_BOUNDS.maxX ||
              newZ < WORLD_BOUNDS.minZ || newZ > WORLD_BOUNDS.maxZ ||
              newY < WORLD_BOUNDS.minY || newY > WORLD_BOUNDS.maxY) {
            return; // Enforce 16x16 perimeter boundaries
          }

          if (this.worldData[newKey] !== undefined) {
            return; // Block overlapping coordinate collision validation
          }

          // Write block data to map index
          this.worldData[newKey] = this.selectedBlockIndex;
          this.spawnBlockEntity(newX, newY, newZ, this.selectedBlockIndex);
          this.saveWorld();
        },

        removeBlockEntity: function(blockEl) {
          const key = blockEl.dataset.gridPos;
          if (key && this.worldData[key] !== undefined) {
            delete this.worldData[key];
            blockEl.parentNode.removeChild(blockEl);
            this.saveWorld();
          }
        },

        saveWorld: function() {
          localStorage.setItem('vr_sandbox_save_v2', JSON.stringify(this.worldData));
        },

        updateHUD: function() {
          if(this.hudText) {
            this.hudText.setAttribute('value', `ITEM: ${BLOCK_TYPES[this.selectedBlockIndex].name}`);
          }
        }
      });

      // TARGET DETECTOR & HIGHLIGHT MANAGER
      AFRAME.registerComponent('miner-hand', {
        init: function () {
          this.worldManager = document.querySelector('#world').components['world-manager'];
          this.highlightBox = document.querySelector('#highlight-frame');

          // Destruction Event Trigger
          this.el.addEventListener('triggerdown', () => {
            const hit = this.getIntersection();
            if (hit) this.worldManager.removeBlockEntity(hit.el);
          });

          // Placement Event Trigger
          this.el.addEventListener('gripdown', () => {
            const hit = this.getIntersection();
            if (hit) this.worldManager.addBlockAtIntersection(hit);
          });

          // Inventory Toggle Hook
          this.el.addEventListener('abuttondown', () => {
            document.querySelector('#world').emit('cycle-block');
          });
        },

        getIntersection: function() {
          let raycasterComp = this.el.components.raycaster;
          if (raycasterComp && raycasterComp.intersections.length > 0) {
            return raycasterComp.intersections[0];
          }
          return null;
        },

        // Real-Time Wireframe Highlight Rendering Loop
        tick: function() {
          const hit = this.getIntersection();
          if (hit && hit.el.classList.contains('voxel')) {
            let targetPos = hit.el.getAttribute('position');
            this.highlightBox.setAttribute('position', targetPos);
            this.highlightBox.setAttribute('visible', 'true');
          } else {
            this.highlightBox.setAttribute('visible', 'false');
          }
        }
      });
    </script>
  </head>
  <body>
    <a-scene fog="type: linear; color: #A0C4DF; near: 10; far: 18">
      
      <a-sky color="#A0C4DF"></a-sky>

      <a-entity position="0 0 -4" animation="property: rotation; to: 360 0 0; loop: true; dur: 90000; easing: linear">
        <a-entity light="type: directional; intensity: 0.8; color: #FFFDF0;" position="0 25 0"></a-entity>
        <a-entity light="type: directional; intensity: 0.2; color: #334466;" position="0 -25 0"></a-entity>
      </a-entity>
      
      <a-entity light="type: ambient; intensity: 0.4; color: #FFFFFF;"></a-entity>

      <a-entity id="rig" movement-controls="controls: gamepad; speed: 0.15" position="0 1 0">
        <a-camera position="0 1.6 0" look-controls="pointerLockEnabled: true"></a-camera>
        
        <a-entity oculus-touch-controls="hand: left"></a-entity>
        
        <a-entity id="right-hand" oculus-touch-controls="hand: right" 
                  raycaster="objects: .voxel; far: 7; showLine: true; lineColor: #ffa500;" 
                  miner-hand>
          
          <a-entity position="0 0.08 0.05" rotation="-45 0 0">
            <a-plane width="0.22; " height="0.08" color="#111" opacity="0.9"></a-plane>
            <a-text id="hud-text" value="" align="center" color="#00FFCC" width="0.9" position="0 0 0.01"></a-text>
          </a-entity>
        </a-entity>
      </a-entity>

      <a-plane position="0 -1.05 0" rotation="-90 0 0" width="5000" height="5000" visible="false"></a-plane>

      <a-entity id="world" world-manager>
        <a-box id="highlight-frame" 
               material="color: #00FF66; wireframe: true; wireframeLineWidth: 4; shader: flat;" 
               scale="1.02 1.02 1.02" 
               visible="false">
        </a-box>
      </a-entity>

    </a-scene>
  </body>
</html>
