<!DOCTYPE html>
<html>
  <head>
    <title>VR Engineering Sandbox - Universal</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

    <script>
      // THE TOOLBOX SPAWNER
      AFRAME.registerComponent('toolbox-item', {
        schema: {
          partType: { type: 'string', default: 'box' },
          color: { type: 'string', default: '#CCC' }
        },
        init: function () {
          this.el.addEventListener('raycaster-intersected', () => {
            this.el.setAttribute('scale', '1.2 1.2 1.2');
          });
          this.el.addEventListener('raycaster-intersected-cleared', () => {
            this.el.setAttribute('scale', '1 1 1');
          });
        }
      });

      // THE LASER GRABBER
      AFRAME.registerComponent('laser-grabber', {
        init: function () {
          this.carriedEntity = null;
          this.carryDistance = 2; 
          this.targetVector = new THREE.Vector3();

          // UNIVERSAL GRAB: Listens for VR triggers OR PC mouse clicks
          const onGrab = () => {
            let hit = this.getIntersection();
            if (!hit) return;

            if (hit.el.classList.contains('toolbox-item')) {
              const partType = hit.el.getAttribute('toolbox-item').partType;
              const color = hit.el.getAttribute('toolbox-item').color;
              this.spawnAndGrabPart(partType, color, hit.point);
            } 
            else if (hit.el.classList.contains('machine-part')) {
              this.carriedEntity = hit.el;
              this.carryDistance = hit.distance; 
            }
          };

          // UNIVERSAL RELEASE
          const onRelease = () => {
            if (this.carriedEntity) {
              this.carriedEntity = null;
            }
          };

          // Map events
          this.el.addEventListener('mousedown', onGrab);
          this.el.addEventListener('triggerdown', onGrab); 
          this.el.addEventListener('mouseup', onRelease);
          this.el.addEventListener('triggerup', onRelease);
        },

        getIntersection: function() {
          let ray = this.el.components.raycaster;
          if (ray && ray.intersections.length > 0) {
            return ray.intersections[0];
          }
          return null;
        },

        spawnAndGrabPart: function(type, color, spawnPoint) {
          let newPart = document.createElement(`a-${type}`);
          newPart.setAttribute('class', 'machine-part');
          newPart.setAttribute('material', `color: ${color}; roughness: 0.5;`);
          
          if (type === 'box') {
            newPart.setAttribute('width', '0.5');
            newPart.setAttribute('height', '0.5');
            newPart.setAttribute('depth', '0.5');
          } else if (type === 'cylinder') { 
            newPart.setAttribute('radius', '0.3');
            newPart.setAttribute('height', '0.2');
          } else if (type === 'sphere') { 
            newPart.setAttribute('radius', '0.25');
          }

          newPart.setAttribute('position', spawnPoint);
          document.querySelector('a-scene').appendChild(newPart);

          setTimeout(() => {
            this.el.components.raycaster.refreshObjects();
          }, 10);

          this.carriedEntity = newPart;
          this.carryDistance = 2; 
        },

        tick: function() {
          if (this.carriedEntity) {
            this.targetVector.set(0, 0, -this.carryDistance);
            this.el.object3D.localToWorld(this.targetVector);
            this.carriedEntity.object3D.position.copy(this.targetVector);
          }
        }
      });
    </script>
  </head>
  <body>
    <a-scene fog="type: exponential; color: #222; density: 0.05" cursor="rayOrigin: mouse">
      <a-sky color="#222"></a-sky>

      <a-entity light="type: point; intensity: 0.8; distance: 20; color: #FFFDF0;" position="0 4 -2"></a-entity>
      <a-entity light="type: ambient; intensity: 0.3; color: #FFFFFF;"></a-entity>

      <a-entity id="rig" position="0 0 0">
        <a-camera position="0 1.6 0">
          <a-entity raycaster="objects: .toolbox-item, .machine-part; far: 10;" laser-grabber visible="false"></a-entity>
        </a-camera>
        
        <a-entity id="left-hand" laser-controls="hand: left"></a-entity>
        
        <a-entity id="right-hand" 
                  laser-controls="hand: right"
                  raycaster="objects: .toolbox-item, .machine-part; far: 10; showLine: true; lineColor: #00FFCC;" 
                  laser-grabber>
        </a-entity>
      </a-entity>

      <a-box position="0 0.8 -2" width="4" height="0.1" depth="2" color="#444" roughness="0.8"></a-box>
      <a-box position="-1.8 0.4 -2" width="0.1" height="0.8" depth="1.8" color="#333"></a-box>
      <a-box position="1.8 0.4 -2" width="0.1" height="0.8" depth="1.8" color="#333"></a-box>

      <a-entity position="0 1.8 -3">
        <a-text value="TOOLBOX" align="center" position="0 0.6 0" color="#00FFCC"></a-text>
        
        <a-box class="toolbox-item" toolbox-item="partType: box; color: #C0C0C0" 
               position="-0.8 0 0" width="0.4" height="0.4" depth="0.4" color="#C0C0C0">
          <a-text value="Beam" align="center" position="0 -0.4 0" scale="0.5 0.5 0.5"></a-text>
        </a-box>

        <a-cylinder class="toolbox-item" toolbox-item="partType: cylinder; color: #FF4500" 
                    position="0 0 0" radius="0.25" height="0.2" color="#FF4500" rotation="90 0 0">
          <a-text value="Wheel" align="center" position="0 -0.4 0" scale="0.5 0.5 0.5" rotation="-90 0 0"></a-text>
        </a-cylinder>

        <a-sphere class="toolbox-item" toolbox-item="partType: sphere; color: #1E90FF" 
                  position="0.8 0 0" radius="0.25" color="#1E90FF">
          <a-text value="Joint" align="center" position="0 -0.4 0" scale="0.5 0.5 0.5"></a-text>
        </a-sphere>
      </a-entity>

      <a-plane position="0 0 0" rotation="-90 0 0" width="50" height="50" color="#111" material="roughness: 1;"></a-plane>

    </a-scene>
  </body>
</html>
