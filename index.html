<!DOCTYPE html>
<html>
  <head>
    <title>Grapple-Hook Gardening Prototype</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  </head>
  <body>
    <a-scene environment="preset: forest">
      
      <a-sky color="#a3d5ff"></a-sky>

      <a-entity id="rig" position="0 1.6 5">
        <a-camera look-controls wasd-controls></a-camera>
        
        <a-entity laser-controls="hand: left" raycaster="objects: .island; far: 40" color="#ff0000"></a-entity>
        <a-entity laser-controls="hand: right" raycaster="objects: .island; far: 40" color="#ff0000"></a-entity>
      </a-entity>

      <a-box class="island" position="0 5 -5" width="4" height="0.5" depth="4" color="#4CAF50"></a-box>
      <a-box class="island" position="-8 8 -12" width="5" height="0.5" depth="5" color="#8BC34A"></a-box>
      <a-box class="island" position="7 6 -10" width="3" height="0.5" depth="3" color="#CDDC39"></a-box>

      <a-sphere position="0 5.8 -5" radius="0.3" color="#FF00FF" 
                animation="property: position; to: 0 6.1 -5; dir: alternate; dur: 2000; loop: true"></a-sphere>
      <a-sphere position="-8 8.8 -12" radius="0.3" color="#00FFFF" 
                animation="property: position; to: -8 9.1 -12; dir: alternate; dur: 1500; loop: true"></a-sphere>
    </a-scene>
  </body>
</html>
