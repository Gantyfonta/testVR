<!DOCTYPE html>
<html>
  <head>
    <title>VR Engineering Sandbox - Physics Edition</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-physics-system@v4.2.2/dist/aframe-physics-system.min.js"></script>

    <script>
      // COMPONENT LOGIC MANAGER
      AFRAME.registerComponent('engineering-part', {
        schema: {
          type: { type: 'string', default: 'block' },
          powered: { type: 'boolean', default: false }
        },
        init: function () {
          this.gluedParts = [];
          
          // If it's a Lever, clicking it toggles power
          if (this.data.type === 'lever') {
            this.el.addEventListener('mousedown', () => { this.togglePower(); });
            this.el.addEventListener('triggerdown', () => { this.togglePower(); });
          }
        },
        togglePower: function() {
          let newState = !this.data.powered;
          this.el.setAttribute('engineering-part', 'powered', newState);
          
          // Visual feedback
          this.el.setAttribute('material', 'color', newState ? '#00FF00' : '#FF0000');
          
          // Transmit power to all glued parts
          this.gluedParts.forEach(part => {
            part.setAttribute('engineering-part', 'powered', newState);
          });
        },
        tick: function() {
          // FAN LOGIC: Apply continuous thrust if powered
          if (this.data.type === 'fan' && this.data.powered && this.el.body) {
            // Apply upward force (relative to the fan's orientation)
            let force = new CANNON.Vec3(0, 15, 0); 
            this.el.object3D.localToWorld(force);
            let worldPos = new CANNON.Vec3().copy(this.el.object3D.position);
            
            // Subtract position to get directional vector, then apply
            force.vsub(worldPos, force); 
            force.normalize();
            force.scale(15, force); // Thrust power
            
            this.el.body.applyForce(force, this.el.body.position);
          }
        }
      });

      // UNIVERSAL PHYSICS GRABBER & GLUE TOOL
      AFRAME.registerComponent('physics-tool', {
        init: function () {
          this.heldEntity = null;
          this.carryDistance = 1.5;

          // GRAB (Trigger / Left Click)
          const onGrab = () => {
            let hit = this.getIntersection();
            if (!hit) return;

            // 1. Spawning from Wrist Menu
            if (hit.el.classList.contains('toolbox-item')) {
              const type = hit.el.getAttribute('data-type');
              const color = hit.el.getAttribute('color');
              this.spawnPart(type, color, hit.point);
            } 
            // 2. Grabbing a real part
            else if (hit.el.classList.contains('machine-part')) {
              this.heldEntity = hit.el;
              this.carryDistance = hit.distance;
              
              // Remove gravity while holding
              this.heldEntity.removeAttribute('dynamic-body');
            }
          };

          // DROP (Release Trigger / Click)
          const onRelease = () => {
            if (this.heldEntity) {
              // Re-enable physics gravity
              this.heldEntity.setAttribute('dynamic-body', 'mass: 1; linearDamping: 0.5; angularDamping: 0.5;');
              this.heldEntity = null;
            }
          };

          // GLUE (Grip / Right Click)
          const onGlue = () => {
            if (!this.heldEntity) return; // Must be holding something to glue it to something else

            let hit = this.getIntersection();
            // Don't glue to yourself, and only glue to other machine parts
            if (hit && hit.el !== this.heldEntity && hit.el.classList.contains('machine-part')) {
              this.glueObjects(this.heldEntity, hit.el);
            }
          };

          this.el.addEventListener('mousedown', onGrab);
          this.el.addEventListener('triggerdown', onGrab);
          
          this.el.addEventListener('mouseup', onRelease);
          this.el.addEventListener('triggerup', onRelease);

          // Using contextmenu (Right Click) for PC testing of the Grip button
          document.addEventListener('contextmenu', (e) => { e.preventDefault(); onGlue(); });
          this.el.addEventListener('gripdown', onGlue);
        },

        getIntersection: function() {
          let ray = this.el.components.raycaster;
          if (ray && ray.intersections.length > 0) return ray.intersections[0];
          return null;
        },

        spawnPart: function(type, color, pos) {
          let el = document.createElement('a-box');
          el.setAttribute('class', 'machine-part');
          el.setAttribute('data-type', type);
          el.setAttribute('engineering-part', `type: ${type}`);
          el.setAttribute('material', `color: ${color}; roughness: 0.5;`);
          el.setAttribute('width', '0.3'); el.setAttribute('height', '0.3'); el.setAttribute('depth', '0.3');
          el.setAttribute('position', pos);
          
          // Different shapes for visuals
          if (type === 'fan') el.setAttribute('geometry', 'primitive: cylinder; radius: 0.2; height: 0.1');
          if (type === 'lever') el.setAttribute('geometry', 'primitive: cone; radiusBottom: 0.15; height: 0.4');

          document.querySelector('a-scene').appendChild(el);
          
          // Grab it immediately
          this.heldEntity = el;
          this.carryDistance = 1.5;
        },

        glueObjects: function(objA, objB) {
          // Wait for Cannon bodies to initialize
          if (!objA.body || !objB.body) return;

          // Create a Cannon.js LockConstraint to weld them together physically
          let constraint = new CANNON.LockConstraint(objA.body, objB.body);
          objA.body.world.addConstraint(constraint);

          // Link their logic so power flows between them
          objA.components['engineering-part'].gluedParts.push(objB);
          objB.components['engineering-part'].gluedParts.push(objA);

          // Visual feedback for successful glue
          let spark = document.createElement('a-sphere');
          spark.setAttribute('radius', '0.05');
          spark.setAttribute('color', '#FFFF00');
          spark.setAttribute('position', objA.getAttribute('position'));
          document.querySelector('a-scene').appendChild(spark);
          setTimeout(() => spark.remove(), 200);
        },

        tick: function() {
          if (this.heldEntity) {
            let target = new THREE.Vector3(0, 0, -this.carryDistance);
            this.el.object3D.localToWorld(target);
            this.heldEntity.object3D.position.copy(target);
          }
        }
      });
    </script>
  </head>
  <body>
    <a-scene physics="debug: false; gravity: -9.8" fog="type: linear; color: #334; near: 2; far: 20" cursor="rayOrigin: mouse">
      <a-sky color="#334"></a-sky>

      <a-entity light="type: point; intensity: 0.8; distance: 20; color: #FFFDF0;" position="0 4 0"></a-entity>
      <a-entity light="type: ambient; intensity: 0.4; color: #FFFFFF;"></a-entity>

      <a-entity id="rig" position="0 0 1">
        <a-camera position="0 1.6 0">
          <a-entity raycaster="objects: .toolbox-item, .machine-part, .static-env; far: 10;" physics-tool visible="false"></a-entity>
        </a-camera>
        
        <a-entity id="left-hand" laser-controls="hand: left">
          <a-entity position="0 0.1 0.1" rotation="-45 90 0" scale="0.5 0.5 0.5">
            <a-text value="TOOLBOX" position="-0.5 0.4 0" color="#00FFCC"></a-text>
            <a-box class="toolbox-item" data-type="block" color="#888" position="-0.6 0 0" width="0.2" height="0.2" depth="0.2"></a-box>
            <a-text value="Block" position="-0.7 -0.2 0" scale="0.5 0.5 0.5"></a-text>

            <a-box class="toolbox-item" data-type="fan" color="#00BFFF" position="-0.2 0 0" width="0.2" height="0.2" depth="0.2"></a-box>
            <a-text value="Fan" position="-0.3 -0.2 0" scale="0.5 0.5 0.5"></a-text>

            <a-box class="toolbox-item" data-type="lever" color="#FF0000" position="0.2 0 0" width="0.2" height="0.2" depth="0.2"></a-box>
            <a-text value="Lever" position="0.1 -0.2 0" scale="0.5 0.5 0.5"></a-text>

            <a-box class="toolbox-item" data-type="motor" color="#FFA500" position="0.6 0 0" width="0.2" height="0.2" depth="0.2"></a-box>
            <a-text value="Motor" position="0.5 -0.2 0" scale="0.5 0.5 0.5"></a-text>

            <a-box class="toolbox-item" data-type="relay" color="#9932CC" position="1.0 0 0" width="0.2" height="0.2" depth="0.2"></a-box>
            <a-text value="Relay" position="0.9 -0.2 0" scale="0.5 0.5 0.5"></a-text>
          </a-entity>
        </a-entity>
        
        <a-entity id="right-hand" laser-controls="hand: right"
                  raycaster="objects: .toolbox-item, .machine-part, .static-env; far: 10; showLine: true;" 
                  physics-tool>
          <a-text value="Trigger/L-Click: Grab/Spawn\nGrip/R-Click: Glue Together\nClick Lever: Toggle Power" 
                  position="-0.1 0.1 0.05" rotation="-45 0 0" scale="0.2 0.2 0.2" color="#00FFCC"></a-text>
        </a-entity>
      </a-entity>

      <a-box class="static-env" static-body position="0 0.8 -1" width="3" height="0.1" depth="1.5" color="#5C4033"></a-box>
      <a-box class="static-env" static-body position="-1.4 0.4 -1" width="0.1" height="0.8" depth="1.4" color="#3C2013"></a-box>
      <a-box class="static-env" static-body position="1.4 0.4 -1" width="0.1" height="0.8" depth="1.4" color="#3C2013"></a-box>

      <a-plane class="static-env" static-body position="0 0 0" rotation="-90 0 0" width="50" height="50" color="#222"></a-plane>

    </a-scene>
  </body>
</html>
