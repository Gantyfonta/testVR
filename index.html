<!DOCTYPE html>
<html>
  <head>
    <title>Quest 2 VR Target Game</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.3/dist/aframe-environment-component.min.js"></script>
    
    <script>
      AFRAME.registerComponent('target-logic', {
        init: function () {
          let el = this.el;
          
          // Listen for a click/trigger event from the VR controller
          el.addEventListener('click', function () {
            // Pick a random new color
            const colors = ['#FF5733', '#33FF57', '#3357FF', '#F333FF', '#FFE633'];
            const newColor = colors[Math.floor(Math.random() * colors.length)];
            el.setAttribute('color', newColor);
            
            // Move the box to a random new position
            const x = (Math.random() - 0.5) * 10; // Between -5 and 5
            const y = 1 + Math.random() * 3;      // Between 1 and 4
            const z = -2 - Math.random() * 5;     // Between -2 and -7
            
            el.setAttribute('position', {x: x, y: y, z: z});
          });
        }
      });
    </script>
  </head>
  <body>
    <a-scene environment="preset: tron">
      
      <a-entity id="rig">
        <a-camera position="0 1.6 0">
          <a-cursor raycaster="objects: .clickable" visible="true"></a-cursor>
        </a-camera>
        <a-entity laser-controls="hand: left" raycaster="objects: .clickable; far: 20"></a-entity>
        <a-entity laser-controls="hand: right" raycaster="objects: .clickable; far: 20"></a-entity>
      </a-entity>

      <a-text value="Point and shoot the spinning box!" position="-1.5 3 -4" color="#FFFFFF" width="6"></a-text>

      <a-box class="clickable" target-logic position="0 1.5 -3" color="#4CC3D9" 
             animation="property: rotation; to: 0 360 0; loop: true; dur: 3000; easing: linear">
      </a-box>

    </a-scene>
  </body>
</html>
